name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate orqa-plugin.json
        run: node -e "JSON.parse(require('fs').readFileSync('orqa-plugin.json', 'utf8'))"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build sidecar
        run: |
          cd sidecar
          npm install
          npm run build
